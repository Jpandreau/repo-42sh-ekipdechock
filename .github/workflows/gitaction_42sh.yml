name: Chocolatine

"on":
  push:
    branches-ignore:
      - 'no-ga/**'
  pull_request:
    branches-ignore:
      - 'no-ga/**'

env:
  MIRROR_SSH_URL: "git@github.com:EpitechPGE1-2025/G-PSU-200-MLN-2-1-42sh-1.git"
  MIRROR_REPO: "EpitechPGE1-2025/G-PSU-200-MLN-2-1-42sh-1"
  EXECUTABLES: "mysh"

jobs:
  check_compilation_and_coding_style:
    name: "check compil and coding style"
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker
    if: github.repository != 'EpitechPGE1-2025/G-PSU-200-MLN-2-1-42sh-1'
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: "check coding style"
        run: banana-check-repo
      - name: "run program"
        run: make 2>&1 |tee make_output.log
        timeout-minutes: 2
        env:
          CC: epiclang
      - name: "error message"
        if: always()
        run: |
          grep "\[Banana\]" make_output.log | while read line; do
            FILE=$(echo "$line" | cut -d ":" -f1)
            LINE=$(echo "$line" | cut -d ":" -f2)
            MSG=$(echo "$line" | cut -d ":" -f4- | sed 's/ error: \[Banana\] //')
            echo "::error file=$FILE,line=$LINE::$MSG"
          done
      - name: "Fail coding style"
        if: always()
        run: |
          if grep "\[Banana\]" make_output.log | grep -E "^[^:]+:[0-9]+:[0-9]+:"; then
            exit 1
          fi
      - name: "clean programme"
        run: make clean
      - name: "executable verification"
        run: |
          IFS=$','
          for exec in $EXECUTABLES; do
            if [ ! -x $exec ]; then
              echo "::error file=$exec::$exec is not executable or does not exist"
              exit 1
            fi
          done

  run_tests:
    name: "run compilation makefile with test_run"
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker
    if: github.repository != 'EpitechPGE1-2025/G-PSU-200-MLN-2-1-42sh-1'
    needs: check_compilation_and_coding_style
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: "run the test_run in makefile"
        run: make tests_run
        timeout-minutes: 2

  check_valgrind:
    name: "check valgrind memory leaks"
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker
    if: github.repository != 'Jpandreau/testrepo'
    needs: check_compilation_and_coding_style
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: "Build program"
        run: make
        timeout-minutes: 2
      - name: "Run valgrind and check malloc/free balance"
        run: |
          IFS=$','
          for exec in $EXECUTABLES; do
            valgrind --leak-check=full --show-leak-kinds=all \
              --log-file=valgrind_output.log \
              ./$exec || true
            MALLOCS=$(grep -oP "total heap usage: \K[0-9]+" valgrind_output.log | head -1)
            FREES=$(grep -oP "total heap usage: [0-9]+ allocs, \K[0-9]+" valgrind_output.log | head -1)
            echo "[$exec] allocs: $MALLOCS | frees: $FREES"
            if [ "$MALLOCS" != "$FREES" ]; then
              echo "::error::[$exec] Memory leak detected: $MALLOCS allocs != $FREES frees"
              exit 1
            fi
          done

  push_to_mirror:
    name: "push the work make on the private repository in a epitech repository"
    runs-on: ubuntu-latest
    needs: [run_tests, check_valgrind]
    if: github.event_name == 'push' && github.repository != 'EpitechPGE1-2025/G-PSU-200-MLN-2-1-42sh-1'
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: "push in the mirror repository"
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_SSH_URL }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}
